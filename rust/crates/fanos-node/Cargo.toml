[package]
name = "fanos-node"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "FANOS node — the unified `fanos` daemon: composes the sans-I/O engines behind the QUIC driver, with a persistent self-certifying identity and bootstrap."
keywords = ["p2p", "overlay", "node", "daemon", "fanos"]
categories = ["network-programming", "command-line-utilities"]

[[bin]]
name = "fanos"
path = "src/bin/fanos.rs"

[dependencies]
fanos-field = { workspace = true, features = ["std"] }
fanos-geometry = { workspace = true, features = ["std"] }
fanos-runtime = { workspace = true, features = ["std"] }
fanos-quic = { path = "../fanos-quic", version = "0.1.0" }
# For `.fanos` name resolution: ONOMA addresses/derivations + CALYPSO descriptors.
fanos-onoma = { path = "../fanos-onoma", version = "0.1.0", features = ["std"] }
fanos-calypso = { path = "../fanos-calypso", version = "0.1.0" }
# DIAULOS reliable encrypted sessions over the node's datagram transport, driven as async streams.
fanos-diaulos = { path = "../fanos-diaulos", version = "0.1.0" }
fanos-session = { path = "../fanos-session", version = "0.1.0" }
# The anonymous profile: carry the same DIAULOS session over threshold onions to a computed meeting
# line (the sans-I/O RendezvousClient core, wrapped as an async transport under the identical stream).
fanos-rendezvous = { path = "../fanos-rendezvous", version = "0.1.0" }
fanos-pqcrypto = { path = "../fanos-pqcrypto", version = "0.1.0" }
# The SOCKS5 Dialer trait a `.fanos` dialer implements (the proxy stays transport-agnostic; the node
# is the integration point that provides a Dialer).
fanos-proxy = { path = "../fanos-proxy", version = "0.1.0" }
rand_core = { version = "0.10", default-features = false }
# OS entropy to seed each dial's ephemeral handshake keys (a fresh CSPRNG per dial).
getrandom = "0.3"
tokio = { version = "1", default-features = false, features = [
    "rt-multi-thread",
    "macros",
    "time",
    "signal",
    "sync",
    "io-util",
] }
tracing = { version = "0.1", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "fmt",
    "ansi",
    "env-filter",
] }

[dev-dependencies]
tokio = { version = "1", default-features = false, features = [
    "rt-multi-thread",
    "macros",
    "time",
] }

[lints]
workspace = true
