[package]
name = "fanos-sim"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Deterministic in-process network simulator that drives the real FANOS node engines (swaps environment + transport)."
keywords = ["simulation", "discrete-event", "p2p", "deterministic", "fanos"]
categories = ["simulation", "network-programming"]

[dependencies]
fanos-field.workspace = true
fanos-geometry.workspace = true
fanos-diakrisis.workspace = true
fanos-wire.workspace = true
fanos-runtime = { workspace = true, features = ["std"] }

[[bin]]
name = "fanos-sim-demo"
path = "src/bin/demo.rs"

[dev-dependencies]
proptest.workspace = true
# For decoding the mandatory CoherenceFrames nodes emit each diagnosis (telemetry e2e scenario).
fanos-telemetry = { workspace = true, features = ["std"] }
# For the NYX anonymity-routing scenario (real onion over the simulated network).
fanos-aphantos = { path = "../fanos-aphantos", version = "0.1.0" }
fanos-pqcrypto = { path = "../fanos-pqcrypto", version = "0.1.0" }
# For the L4 storage scenarios (computing a key's responsible node, MapToPoint).
fanos-crypto = { workspace = true, features = ["std"] }
# For the hierarchy scenario (feeding a child cell's escalation to the parent tier).
fanos-core = { workspace = true, features = ["std"] }
# For the CALYPSO hidden-service flow (address, per-epoch rendezvous, PoW) over the overlay.
fanos-calypso = { path = "../fanos-calypso", version = "0.1.0" }
# For the ONOMA name-system resolution scenario (address derivations + descriptor publish/resolve).
fanos-onoma = { path = "../fanos-onoma", version = "0.1.0" }
# For the NYX mixnet scenarios (anonymity-set entropy math).
fanos-nyx = { workspace = true, features = ["std"] }
# For the networked DKG scenario (DkgNode engine driven over the sim).
fanos-keygen = { path = "../fanos-keygen", version = "0.1.0" }
# For crafting the adversary's dealing in the Byzantine-equivocating-dealer DKG scenario.
fanos-vrf = { path = "../fanos-vrf", version = "0.1.0" }
# For crafting Byzantine/forged frames in the adversary scenarios.
fanos-wire = { workspace = true, features = ["std"] }
# For the anonymous paid-introduction scenario (VOPRF relay credits over the CALYPSO flow).
fanos-incentives = { path = "../fanos-incentives", version = "0.1.0" }
rand_core = { version = "0.6", default-features = false }

[lints]
workspace = true
