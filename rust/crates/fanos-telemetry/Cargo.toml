[package]
name = "fanos-telemetry"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "FANOS telemetry & self-observation: the mandatory per-node CoherenceFrame (a provably-minimal cell self-scan) and its canonical KAT-pinned encoding (docs/design-telemetry.md)."
keywords = ["telemetry", "observability", "coherence", "self-healing", "fanos"]
categories = ["network-programming"]

[dependencies]
# The coherence measures (Φ/P/R, regime, alarm) a frame folds from a cell's correlation matrix.
fanos-diakrisis = { workspace = true }
# The Fano/Hamming 3-bit syndrome — the load-bearing minimal fault localizer.
fanos-code = { workspace = true }
# Canonical wire codec: the CoherenceFrame's byte layout is a derived Wire (audit A1).
fanos-wire = { workspace = true, features = ["alloc"] }
fanos-wire-derive = { workspace = true }
# The noise source for the differentially-private export boundary (audit C7). `RngCore` only — the
# caller injects entropy (a node's CSPRNG in production, a seeded RNG in tests), keeping `dp` sans-I/O.
rand_core = { workspace = true }
# no_std float backend for the DP Laplace sampler's `ln` (std builds use `f64::ln` directly).
libm = { workspace = true, optional = true }
# Optional cross-platform metric backend (macOS/Windows/etc.); Linux prefers the direct /proc probe.
# Its internal FFI/unsafe lives in the dependency — this crate stays `forbid(unsafe_code)`.
sysinfo = { version = "0.39", default-features = false, features = [
    "system",
    "network",
], optional = true }

[dev-dependencies]
# Fuzz the untrusted-input decoders (frame / snapshot) — they must reject, never panic.
proptest.workspace = true
# The DP validation test builds input frames from equicorrelated matrices and drives `privatize` with a
# seeded RNG (deterministic Monte-Carlo over the ε-DP guarantee).
fanos-diakrisis = { workspace = true }
rand_core = { workspace = true }

[features]
default = ["std"]
# `alloc` is the no_std substrate (the CoherenceFrame codec + history use Vec); `std` builds on it and
# adds the file-I/O persistence + the platform system-metric probes (both `#[cfg(feature="std")]`-gated).
# A no_std embedded monitor selects `alloc` + `libm` (the float backend).
std = ["alloc", "fanos-diakrisis/std", "fanos-code/std", "fanos-wire/std"]
alloc = ["fanos-diakrisis/alloc", "fanos-code/alloc", "fanos-wire/alloc"]
libm = ["dep:libm", "fanos-diakrisis/libm"]
# The cross-platform system-metric backend (implies std).
sysinfo = ["std", "dep:sysinfo"]

[lints]
workspace = true
