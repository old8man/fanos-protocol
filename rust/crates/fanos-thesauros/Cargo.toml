[package]
name = "fanos-thesauros"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "THESAUROS — the FANOS content-storage platform: content-addressed objects, proof of retrievability, and the capacity market over the L4 erasure store (docs/design-storage.md)."
keywords = ["storage", "content-addressed", "merkle", "post-quantum", "fanos"]
categories = ["cryptography", "no-std"]

[dependencies]
# BLAKE3 domain-separated hashing for the Merkle content tree (the CID) + the PoR challenge, and the shared
# ChaCha20-Poly1305 AEAD for edge encryption (the `object` module). `aead` pulls `alloc`; `std` layers on by default.
fanos-primitives = { workspace = true, default-features = false, features = ["aead"] }

[features]
default = ["std"]
std = ["fanos-primitives/std"]

[lints]
workspace = true
