fanos-geometry.workspace = true
fanos-crypto.workspace = true

[features]
default = ["std"]
std = ["fanos-geometry/std", "fanos-crypto/std"]
alloc = ["fanos-geometry/alloc", "fanos-crypto/alloc"]

[dev-dependencies]
proptest.workspace = true

[lints]
workspace = true
