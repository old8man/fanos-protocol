[package]
name = "fanos-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "The FANOS node as a sans-I/O state machine: environment ports + the OverlayNode engine (the code that ships)."
keywords = ["sans-io", "state-machine", "overlay", "p2p", "fanos"]
categories = ["network-programming", "no-std"]

[dependencies]
fanos-field.workspace = true
fanos-geometry.workspace = true
fanos-code.workspace = true
fanos-diakrisis.workspace = true
fanos-telemetry.workspace = true
fanos-primitives.workspace = true
# The overlay engine verifies signed membership descriptors (§80) — the real hybrid verifier lives in
# fanos-pqcrypto (no_std), so the sans-I/O engine authenticates membership natively on any target.
fanos-pqcrypto.workspace = true
fanos-core.workspace = true
fanos-wire.workspace = true
fanos-wire-derive.workspace = true

[features]
default = ["std"]
# The sans-I/O overlay engine is heapful (BTreeMap/Vec) but needs no `std`: `alloc` is the substrate,
# `std` builds on it. A no_std embedded node selects `alloc` + `libm` — the engine (and its signed-
# membership verification via the no_std fanos-pqcrypto) then runs on-target. (`cargo build -p
# fanos-runtime --no-default-features --features alloc,libm` is the embedded build.)
std = [
    "alloc",
    "fanos-geometry/std",
    "fanos-code/std",
    "fanos-diakrisis/std",
    "fanos-telemetry/std",
    "fanos-primitives/std",
    "fanos-core/std",
    "fanos-wire/std",
]
alloc = [
    "fanos-geometry/alloc",
    "fanos-code/alloc",
    "fanos-diakrisis/alloc",
    "fanos-telemetry/alloc",
    "fanos-primitives/alloc",
    "fanos-core/alloc",
    "fanos-wire/alloc",
]
# For no_std targets: supply DIAKRISIS's float backend.
libm = ["fanos-diakrisis/libm", "fanos-telemetry/libm"]

[lints]
workspace = true
