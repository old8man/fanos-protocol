[package]
name = "fanos-vpn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "FANOS VPN datapath (spec §11.4): a sans-I/O IPv4/UDP flow engine that tunnels UDP/DNS through a FANOS exit; the TUN driver and userspace-TCP mode layer on top."
keywords = ["vpn", "tun", "dns", "anonymity", "fanos"]
categories = ["network-programming"]

[dependencies]
# The packet codec + flow engine are pure std. The multiplexer reuses the SOCKS5 UDP-ASSOCIATE datagram seam
# (`UdpDialer`/`UdpTunnel`) so the VPN and the proxy share one exit-UDP-tunnel abstraction.
fanos-proxy.workspace = true
tokio = { workspace = true, features = ["rt", "sync", "macros"] }
# The real OS TUN device adapter + the full-tunnel userspace TCP/IP stack, behind the `device` feature (off
# by default): `tun` is a safe wrapper over the platform device, `ipstack` is the userspace stack that
# terminates TCP/UDP so full-tunnel mode can bridge each flow to an exit. The lightweight UDP datapath core
# stays device-/stack-agnostic and fully testable without either.
tun = { version = "0.8", optional = true, features = ["async"] }
ipstack = { version = "1.0.1", optional = true }

[features]
# Compile the real TUN device adapter (`device`) and the full-tunnel stack (`fulltunnel`) for a runnable
# `fanos vpn` (TCP + UDP). The device syscalls + stack are runtime-verified only (need root / a TUN); the
# lightweight UDP datapath is verified without this feature.
device = ["dep:tun", "dep:ipstack"]

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "macros", "time"] }

[lints]
workspace = true
