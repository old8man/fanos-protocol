[package]
name = "fanos-vpn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "FANOS VPN datapath (spec §11.4): a sans-I/O IPv4/UDP flow engine that tunnels UDP/DNS through a FANOS exit; the TUN driver and userspace-TCP mode layer on top."
keywords = ["vpn", "tun", "dns", "anonymity", "fanos"]
categories = ["network-programming"]

[dependencies]
# The packet codec + flow engine are pure std. The multiplexer reuses the SOCKS5 UDP-ASSOCIATE datagram seam
# (`UdpDialer`/`UdpTunnel`) so the VPN and the proxy share one exit-UDP-tunnel abstraction.
fanos-proxy.workspace = true
tokio = { workspace = true, features = ["rt", "sync", "macros"] }
# The real OS TUN device adapter, behind the `device` feature (off by default): a safe wrapper over the
# platform TUN device. The datapath core stays device-agnostic and fully testable without it.
tun = { version = "0.8", optional = true, features = ["async"] }

[features]
# Compile the real TUN device adapter (`device` module) for a runnable `fanos vpn`. Its device syscalls need
# root / a TUN and so are runtime-verified only — the datapath core is verified without this feature.
device = ["dep:tun"]

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "macros", "time"] }

[lints]
workspace = true
